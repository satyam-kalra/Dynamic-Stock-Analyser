name: Market Intelligence Scout

on:
  schedule:
    # 1. Market Open: 9:30 AM ET (14:00 UTC)
    - cron: '0 14 * * 1-5'
    # 2. Market Close: 4:00 PM ET (21:00 UTC - Adjusted for Newfoundland Time)
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  scout_and_report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies & AI Models
        run: |
          pip install -r requirements.txt
          python -m textblob.download_corpora

      - name: Execute AI Stock Agent
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASS: ${{ secrets.SENDER_PASS }}
        run: python bot.py
